<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Content Summarizer</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h1>Universal AI Content Summarizer</h1>

    <p class="subtitle">
        Summarize long text using AI-powered NLP
    </p>

    <form method="POST">

        <textarea
            name="text"
            placeholder="Paste your text here..."
            required></textarea>

        <button type="submit">
            Generate Summary
        </button>

    </form>

    {% if summary %}
    <div class="summary-box">

        <h2>Generated Summary</h2>

        <p>{{ summary }}</p>

    </div>
    {% endif %}

</div>

</body>
</html>
