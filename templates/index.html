<!DOCTYPE html>
<html>
<head>
    <title>AI Content Summarizer</title>
</head>
<body>

<h1>AI Content Summarizer</h1>

<form method="POST">

    <textarea
        name="text"
        rows="12"
        cols="80"
        placeholder="Enter text here..."
    ></textarea>

    <br><br>

    <button type="submit">
        Generate Summary
    </button>

</form>

<hr>

<h2>Summary</h2>

<p>{{ summary }}</p>

</body>
</html>
